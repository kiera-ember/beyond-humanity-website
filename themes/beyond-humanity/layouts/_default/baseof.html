<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    {{ partial "head.html" . }}
</head>
<body>
    <div id="site-wrapper">
        {{ partial "header.html" . }}
        
        <main id="main-content">
            {{ block "main" . }}{{ end }}
        </main>
        
        {{ partial "footer.html" . }}
    </div>
    
    <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
